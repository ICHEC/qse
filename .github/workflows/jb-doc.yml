name: jb-docs

on:
  push:
    branches:
      - main  # or your default branch
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # 1. Setup uv (Massive speed boost for docs dependencies)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      # 2. Install dependencies (Jupyter Book, Myst-NB, Sphinx-AutoAPI, etc.)
      - name: Install dependencies
        run: |
          uv pip install ".[docs]"

      # 3. Build the book using uv run
      - name: Build the book
        run: |
          uv run jupyter-book build docs/

      # 4. Deploy to GitHub Pages (Only if on the main branch)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
