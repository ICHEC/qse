name: Upload qse to PyPI

# This tells GitHub to run the workflow when you publish a new Release on GitHub
on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Build and upload to PyPI
    runs-on: ubuntu-latest
    
    # This environment name must match what you typed in PyPI
    environment:
      name: pypi
      url: https://pypi.org/p/qse
      
    permissions:
      # IMPORTANT: this permission is required for Trusted Publishing (OIDC)
      id-token: write  
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build the package
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1